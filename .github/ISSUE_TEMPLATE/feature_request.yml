name: "\U0001F4A1 Feature Request"
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe what you'd like.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What problem does this feature solve? Or what use case does it support?
      placeholder: "I often need to ... but currently ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've thought of?
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Target Platform
      options:
        - Both (macOS & Windows)
        - macOS only
        - Windows only
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Mockups / References
      description: If applicable, add mockups, screenshots, or links to similar features in other apps.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the feature request.
    validations:
      required: false
